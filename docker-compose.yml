services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline_pass
      POSTGRES_DB: content_pipeline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d content_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
