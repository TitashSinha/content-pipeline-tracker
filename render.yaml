services:
  - type: web
    name: content-pipeline-tracker-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npx prisma db push && node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
